name: CI

on:
  push:
    branches: [main]
  pull_request:
  # mise-lock.yaml が GITHUB_TOKEN で push / 作成する PR には workflow run が自動発火しないため、
  # PR head ブランチへ明示的に dispatch できるようにする
  workflow_dispatch:

permissions:
  contents: read
  # fail-fast: 失敗した job が run 全体をキャンセルする (他の並列チェックを止める) のに必要
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 各チェックは reusable workflow として並列実行し、1 つでも失敗したら
# その時点で run 全体をキャンセルする (fail-fast)。
# チェックを追加するときはここに job を足し、呼び出される側は
# workflow_call + fail-fast input を持つ reusable workflow として実装する。
jobs:
  prek:
    uses: ./.github/workflows/prek.yaml
    with:
      fail-fast: true

  gitleaks:
    uses: ./.github/workflows/gitleaks.yaml
    with:
      fail-fast: true
